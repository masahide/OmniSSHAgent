name: Windows

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.25.6
          cache: true
      - name: Formatting
        shell: pwsh
        run: |
          gofmt -w cmd internal
          if (git status --short) { throw "gofmt produced changes" }
      - run: go vet ./...
      - run: go test ./...
      - name: Compile build-tagged E2E tests
        run: go test -tags=e2e -run "^$" ./internal/e2e
      - name: Build console
        run: go build -trimpath -o OmniSSHAgent-console.exe ./cmd/omnisshagent
      - name: Build windowsgui
        run: go build -trimpath -ldflags="-H=windowsgui" -o OmniSSHAgent.exe ./cmd/omnisshagent
